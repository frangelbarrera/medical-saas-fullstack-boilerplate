name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Run Tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci_test_jwt_secret_minimum_32_characters_long_for_testing_only' }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY_TEST || 'a'.repeat(64) }}
          PAYMENT_WEBHOOK_SECRET: ${{ secrets.PAYMENT_WEBHOOK_SECRET_TEST || 'ci_test_webhook_secret_min_16_chars' }}
          FRONTEND_URL: http://localhost:3000

      - name: Production Build
        run: npm run build

      - name: Security Audit (high+ critical)
        run: npm audit --audit-level=high
        # NOTE: continue-on-error removed. A high-severity vuln should fail CI.

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: dist
          path: dist/
          retention-days: 7
