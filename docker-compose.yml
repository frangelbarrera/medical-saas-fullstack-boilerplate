version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: medical_saas_db
    restart: always
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-medical_saas_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: medical_saas_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PGDATABASE: ${PGDATABASE:-medical_saas_db}
      JWT_SECRET: ${JWT_SECRET:-medical_saas_secret_key_2026}
      NODE_ENV: production
    depends_on:
      - db

volumes:
  postgres_data:
